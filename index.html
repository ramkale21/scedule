<!DOCTYPE html>
<html>
<head>
  <title>Study Schedule</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1, h2 {
      color: #38bdf8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #1e293b;
    }

    tr.completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      cursor: pointer;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>

<!-- SUBJECTS -->
<div class="card">
<h2>Subjects</h2>
<div id="subjects"></div>
</div>

<!-- TODO -->
<div class="card">
<h2>To Do</h2>
<div id="todo"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // ===== TABLE CHECKBOXES =====
  const rows = document.querySelectorAll("#schedule tr");

  rows.forEach((row, i) => {
    if (i === 0) return; // skip header

    const checkbox = row.querySelector("input");
    const key = "row_" + (i - 1);

    // Load saved state
    const saved = localStorage.getItem(key);
    if (saved === "true") {
      checkbox.checked = true;
      row.classList.add("completed");
    }

    // Save on change
    checkbox.addEventListener("change", () => {
      localStorage.setItem(key, checkbox.checked);
      row.classList.toggle("completed", checkbox.checked);
    });
  });


  // ===== LIST FUNCTION =====
  function createList(id, items) {
    const container = document.getElementById(id);

    items.forEach((text, i) => {
      const key = id + "_" + i;
      const checked = localStorage.getItem(key) === "true";

      const div = document.createElement("div");

      const label = document.createElement("label");
      label.className = checked ? "done" : "";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = checked;

      checkbox.addEventListener("change", () => {
        localStorage.setItem(key, checkbox.checked);
        label.classList.toggle("done", checkbox.checked);
      });

      label.appendChild(checkbox);
      label.append(" " + text);
      div.appendChild(label);
      container.appendChild(div);
    });
  }

  // ===== INIT LISTS =====
  createList("subjects", ["WD","DS","DE","OOPS","Maths","CS"]);

  createList("todo", [
    "WD Notes",
    "OOPS 10 questions",
    "DE File",
    "DS File"
  ]);

});
</script>

</body>
