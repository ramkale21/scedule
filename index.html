<!DOCTYPE html>
<html>
<head>
  <title>Study Schedule</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #334155;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #1e293b;
    }

    tr.completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      cursor: pointer;
    }

    .weekend {
    color: #facc15;
    font-weight: 600;
    }

    .weekend b {
    display: inline-block;
    padding: 4px 10px;
    border: 1px solid rgba(250, 204, 21, 0.4);
    border-radius: 999px;
    }

</style>
</head>

<body>

<h1>📅 Study Dashboard</h1>
<h2 id="counter">Days Remaining: 0</h2>

<table id="schedule">
<tr>
<th>Done</th>
<th>Date</th>
<th>Exam</th>
<th>DS</th>
<th>Other</th>
</tr>

<tr><td><input type="checkbox"></td><td class="weekend"><b>25</b></td><td></td><td>100</td><td>DE</td></tr>
<tr><td><input type="checkbox"></td><td class="weekend"><b>26</b></td><td></td><td>150</td><td>DE</td></tr>
<tr><td><input type="checkbox"></td><td>27</td><td></td><td>250</td><td></td></tr>
<tr><td><input type="checkbox"></td><td>28</td><td></td><td>250</td><td></td></tr>
<tr><td><input type="checkbox"></td><td>29</td><td></td><td>250</td><td></td></tr>
<tr><td><input type="checkbox"></td><td>30</td><td></td><td>250</td><td></td></tr>

<tr><td><input type="checkbox"></td><td>1</td><td></td><td></td><td>Maths</td></tr>
<tr><td><input type="checkbox"></td><td class="weekend"><b>2</b></td><td></td><td></td><td>Maths</td></tr>
<tr><td><input type="checkbox"></td><td class="weekend"><b>3</b></td><td></td><td></td><td>Maths</td></tr>

<tr><td><input type="checkbox"></td><td>4</td><td>Maths</td><td></td><td>DE</td></tr>
<tr><td><input type="checkbox"></td><td>5</td><td></td><td></td><td>DE</td></tr>
<tr><td><input type="checkbox"></td><td>6</td><td>DE</td><td></td><td>DS</td></tr>
<tr><td><input type="checkbox"></td><td>7</td><td></td><td></td><td>DS</td></tr>
<tr><td><input type="checkbox"></td><td>8</td><td>DS</td><td></td><td>CS</td></tr>

<tr><td><input type="checkbox"></td><td class="weekend"><b>9</b></td><td></td><td></td><td>WD</td></tr>
<tr><td><input type="checkbox"></td><td class="weekend"><b>10</b></td><td></td><td></td><td>CS</td></tr>

<tr><td><input type="checkbox"></td><td>11</td><td>CS</td><td></td><td>WD</td></tr>
<tr><td><input type="checkbox"></td><td>12</td><td></td><td></td><td>WD</td></tr>
<tr><td><input type="checkbox"></td><td>13</td><td>WD</td><td></td><td>OOPS</td></tr>
<tr><td><input type="checkbox"></td><td>14</td><td></td><td></td><td>OOPS</td></tr>
<tr><td><input type="checkbox"></td><td>15</td><td>OOPS</td><td></td><td></td></tr>

</table>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const rows = document.querySelectorAll("#schedule tr");
  const counter = document.getElementById("counter");

  function updateCounter() {
    let remaining = 0;

    rows.forEach((row, i) => {
      if (i === 0) return; // skip header
      const checkbox = row.querySelector("input");
      if (!checkbox.checked) remaining++;
    });

    counter.textContent = "Days Remaining: " + remaining;
  }

  rows.forEach((row, i) => {
    if (i === 0) return;

    const checkbox = row.querySelector("input");
    const key = "row_" + (i - 1);

    const saved = localStorage.getItem(key);
    if (saved === "true") {
      checkbox.checked = true;
      row.classList.add("completed");
    }

    checkbox.addEventListener("change", () => {
      localStorage.setItem(key, checkbox.checked);
      row.classList.toggle("completed", checkbox.checked);
      updateCounter(); // 🔥 update on click
    });
  });

  updateCounter(); // 🔥 initial load

});
</script>
</body>
</html>
